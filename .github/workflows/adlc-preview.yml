# ADLC — Preview Deploy
#
# Triggers when CI passes on a PR.
# Builds the changed workspace and deploys it to GitHub Pages
# at a unique preview URL per PR, then posts the URL as a PR comment.
#
# Preview URL pattern:
#   https://saad-adlc.github.io/adlc-dev/previews/pr-<N>-<workspace>/
#
# Requires:
#   - GitHub Pages enabled on adlc-dev (Settings → Pages → Source: GitHub Actions)
#   - ADLC_AGENT_TOKEN secret with repo + pages write scope

name: ADLC — Preview Deploy

on:
  workflow_run:
    workflows: ["ADLC — CI"]
    types: [completed]

jobs:
  deploy-preview:
    name: Deploy preview to GitHub Pages
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ADLC_AGENT_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Detect workspace from changed files
        id: detect
        run: |
          BASE=${{ github.event.workflow_run.pull_requests[0].base.sha }}
          HEAD=${{ github.event.workflow_run.head_sha }}

          WORKSPACE=$(git diff --name-only "$BASE"..."$HEAD" \
            | grep '^workspaces/' \
            | head -1 \
            | cut -d'/' -f2)

          PR_NUMBER=${{ github.event.workflow_run.pull_requests[0].number }}

          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "preview_path=previews/pr-${PR_NUMBER}-${WORKSPACE}" >> $GITHUB_OUTPUT
          echo "preview_url=https://saad-adlc.github.io/adlc-dev/previews/pr-${PR_NUMBER}-${WORKSPACE}/" >> $GITHUB_OUTPUT
          echo "Workspace: $WORKSPACE | PR: $PR_NUMBER"

      # WS10: stash the status-comment script to a temp dir BEFORE the gh-pages
      # checkout wipes the working tree (gh-pages is an orphan branch without
      # .github/scripts/). All three status steps below call this temp copy.
      - name: Stash status script (survives the gh-pages checkout)
        if: steps.detect.outputs.workspace != ''
        run: cp .github/scripts/post-status-comment.sh "$RUNNER_TEMP/post-status-comment.sh"

      - name: Status -> deploying (in-place comment — no branch commit)
        if: steps.detect.outputs.workspace != ''
        env:
          GH_TOKEN: ${{ secrets.ADLC_AGENT_TOKEN }}
        run: |
          # WS10: update the single status comment instead of committing status.json
          # to the feature branch (a [skip ci] commit would move the PR head past CI).
          bash "$RUNNER_TEMP/post-status-comment.sh" \
            "${{ steps.detect.outputs.pr_number }}" \
            "deploying" \
            "Publishing the live preview."

      - name: Setup Node 20
        if: steps.detect.outputs.workspace != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: workspaces/${{ steps.detect.outputs.workspace }}/package-lock.json

      - name: Install dependencies
        if: steps.detect.outputs.workspace != ''
        working-directory: workspaces/${{ steps.detect.outputs.workspace }}
        run: npm ci

      - name: Build
        if: steps.detect.outputs.workspace != ''
        working-directory: workspaces/${{ steps.detect.outputs.workspace }}
        env:
          # Set base path so assets resolve correctly under the preview subdirectory
          VITE_BASE_PATH: /adlc-dev/${{ steps.detect.outputs.preview_path }}/
        run: npx vite build --base /adlc-dev/${{ steps.detect.outputs.preview_path }}/

      - name: Checkout gh-pages branch
        if: steps.detect.outputs.workspace != ''
        run: |
          git config user.name "adlc-agent"
          git config user.email "adlc-agent@saad-adlc.com"

          # Fetch or create gh-pages branch
          git fetch origin gh-pages 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
            echo "# ADLC Previews" > README.md
            git add README.md
            git commit -m "init: create gh-pages branch"
          fi

      - name: Copy build to preview path
        if: steps.detect.outputs.workspace != ''
        run: |
          mkdir -p ${{ steps.detect.outputs.preview_path }}
          cp -r workspaces/${{ steps.detect.outputs.workspace }}/dist/. \
            ${{ steps.detect.outputs.preview_path }}/

          git add ${{ steps.detect.outputs.preview_path }}

          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "preview: PR #${{ steps.detect.outputs.pr_number }} — ${{ steps.detect.outputs.workspace }}"
            git push origin gh-pages
          fi

      - name: Status -> preview-deployed (in-place comment — no branch commit)
        if: steps.detect.outputs.workspace != ''
        env:
          GH_TOKEN: ${{ secrets.ADLC_AGENT_TOKEN }}
        run: |
          # WS10: the working tree is on gh-pages here, so we no longer switch back
          # to the feature branch to write status.json (that [skip ci] commit moved
          # the PR head past CI). Just update the status comment via the API; the
          # clickable preview URL is posted by the dedicated preview comment below (Q3).
          bash "$RUNNER_TEMP/post-status-comment.sh" \
            "${{ steps.detect.outputs.pr_number }}" \
            "preview-deployed" \
            "Your live preview is ready — the link is in the preview comment below."

      - name: Post preview URL as PR comment
        if: steps.detect.outputs.workspace != ''
        env:
          GH_TOKEN: ${{ secrets.ADLC_AGENT_TOKEN }}
        run: |
          # Delete any previous preview comment on this PR
          EXISTING=$(gh pr view ${{ steps.detect.outputs.pr_number }} \
            --repo ${{ github.repository }} \
            --json comments \
            --jq '.comments[] | select(.body | startswith("🔍 **ADLC Preview")) | .databaseId' \
            2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            gh api --method DELETE \
              "/repos/${{ github.repository }}/issues/comments/$EXISTING" \
              2>/dev/null || true
          fi

          gh pr comment ${{ steps.detect.outputs.pr_number }} \
            --repo ${{ github.repository }} \
            --body "🔍 **ADLC Preview deployed**

          **Live preview:** ${{ steps.detect.outputs.preview_url }}

          **Workspace:** \`${{ steps.detect.outputs.workspace }}\`
          **Commit:** \`${{ github.event.workflow_run.head_sha }}\`

          > This preview updates automatically when new commits are pushed and CI passes.
          > To request changes, reply in your Claude chat — the ADLC agent will iterate and redeploy."

      - name: Status -> deploy-failed (in-place comment — no branch commit)
        if: failure() && steps.detect.outputs.workspace != ''
        env:
          GH_TOKEN: ${{ secrets.ADLC_AGENT_TOKEN }}
        run: |
          # WS10: failure may happen before or after the gh-pages checkout. The stash
          # step runs right after detect, so the temp copy is present either way.
          bash "$RUNNER_TEMP/post-status-comment.sh" \
            "${{ steps.detect.outputs.pr_number }}" \
            "deploy-failed" \
            "The app is built and safe, but publishing the preview failed — needs a manual look."
