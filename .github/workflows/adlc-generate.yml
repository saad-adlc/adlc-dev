# ADLC — Generate Feature  (PATCHED: + status.json channel, + early branch push)
# Changes vs original are marked:  # >>> STATUS PATCH
# Everything else is byte-identical to your current file.

name: ADLC — Generate Feature

on:
  issues:
    types: [labeled]

jobs:
  generate:
    # Engine coexistence (NOT parked): run the proven hand-rolled generator when the
    # fail-over controller routes here (adlc-fallback label), or when the operator has
    # forced the legacy engine. In default gh-aw mode on an adlc-generate label this is
    # false -> gh-aw owns it (no double-run). Both cases are real `issues: labeled`
    # events, so github.event.issue.* is fully populated and the job logic is unchanged.
    if: github.event.label.name == 'adlc-fallback' || (github.event.label.name == 'adlc-generate' && vars.ADLC_ENGINE == 'legacy')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout adlc-dev
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ADLC_AGENT_TOKEN }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pull latest standards from adlc-standards
        run: |
          git clone \
            https://x-access-token:${{ secrets.ADLC_AGENT_TOKEN }}@github.com/saad-adlc/adlc-standards.git \
            _standards
          cp _standards/CLAUDE.md ./CLAUDE.md
          cp -r _standards/ai-dev ./ai-dev
          mkdir -p .claude/commands
          cp _standards/ai-dev/workflows/*.md .claude/commands/

      - name: Install Claude Code
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Create feature branch
        id: branch
        run: |
          ISSUE=${{ github.event.issue.number }}
          TITLE="${{ github.event.issue.title }}"
          KEBAB=$(printf '%s' "$TITLE" \
            | LC_ALL=C tr '[:upper:]' '[:lower:]' \
            | LC_ALL=C sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//')
          if [ "${#KEBAB}" -gt 40 ]; then
            KEBAB="${KEBAB:0:40}"
            KEBAB=$(printf '%s' "$KEBAB" | sed -E 's/-[^-]*$//; s/-+$//')
          fi
          [ -z "$KEBAB" ] && KEBAB="feature"
          SLUG="$KEBAB"
          BRANCH="feature/issue-${ISSUE}-${SLUG}"
          WORKSPACE="workspaces/issue-${ISSUE}-${SLUG}"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "slug=issue-${ISSUE}-${SLUG}" >> $GITHUB_OUTPUT

      # >>> STATUS PATCH — helper script, used by every status update below
      - name: Create status helper
        run: |
          cat > adlc-status.sh << 'SH'
          #!/bin/bash
          # usage: SLUG=.. BRANCH=.. [PR=..] [PREVIEW_URL=..] ./adlc-status.sh <stage> <detail>
          set -e
          STAGE=$1; DETAIL=$2
          mkdir -p "workspaces/${SLUG}/.adlc"
          cat > "workspaces/${SLUG}/.adlc/status.json" << JSON
          { "stage": "${STAGE}", "iteration": ${ITER:-0},
            "pr": ${PR:-null},
            "preview_url": $( [ -n "$PREVIEW_URL" ] && echo "\"$PREVIEW_URL\"" || echo null ),
            "detail": "${DETAIL}",
            "updated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)" }
          JSON
          git config user.name "adlc-agent"
          git config user.email "adlc-agent@saad-adlc.com"
          git add "workspaces/${SLUG}/.adlc/status.json"
          git commit -m "chore(${SLUG}): status -> ${STAGE} [skip ci]"
          git push origin "${BRANCH}"
          SH
          chmod +x adlc-status.sh

      - name: Scaffold workspace
        id: scaffold
        run: |
          WORKSPACE=${{ steps.branch.outputs.workspace }}
          SLUG=${{ steps.branch.outputs.slug }}
          mkdir -p "${WORKSPACE}/src"

          cat > "${WORKSPACE}/.gitignore" << 'EOF'
          node_modules
          dist
          coverage
          *.local
          .env
          .env.*
          !.env.example
          EOF

          cat > "${WORKSPACE}/package.json" << EOF
          {
            "name": "${SLUG}",
            "private": true,
            "version": "0.0.0",
            "type": "module",
            "scripts": {
              "dev": "vite",
              "build": "vite build",
              "typecheck": "tsc --noEmit",
              "lint": "eslint . --max-warnings 0",
              "test": "vitest run",
              "test:coverage": "vitest run --coverage",
              "ci": "npm run typecheck && npm run lint && npm run test:coverage"
            },
            "dependencies": {
              "react": "^18.3.1",
              "react-dom": "^18.3.1"
            },
            "devDependencies": {
              "@eslint/js": "^9.15.0",
              "@testing-library/jest-dom": "^6.4.0",
              "@testing-library/react": "^16.0.1",
              "@types/react": "^18.3.12",
              "@types/react-dom": "^18.3.1",
              "@vitejs/plugin-react": "^4.3.3",
              "@vitest/coverage-v8": "^2.1.5",
              "eslint": "^9.15.0",
              "globals": "^15.12.0",
              "jsdom": "^25.0.1",
              "typescript": "^5.6.3",
              "typescript-eslint": "^8.15.0",
              "vite": "^5.4.11",
              "vitest": "^2.1.5"
            }
          }
          EOF

          cat > "${WORKSPACE}/tsconfig.json" << 'EOF'
          {
            "compilerOptions": {
              "target": "ES2020",
              "useDefineForClassFields": true,
              "lib": ["ES2020", "DOM", "DOM.Iterable"],
              "module": "ESNext",
              "skipLibCheck": true,
              "moduleResolution": "bundler",
              "resolveJsonModule": true,
              "isolatedModules": true,
              "moduleDetection": "force",
              "noEmit": true,
              "jsx": "react-jsx",
              "strict": true,
              "noUnusedLocals": true,
              "noUnusedParameters": true,
              "noFallthroughCasesInSwitch": true,
              "types": ["vitest/globals"]
            },
            "include": ["src"]
          }
          EOF

          cat > "${WORKSPACE}/vite.config.ts" << 'EOF'
          import { defineConfig } from 'vitest/config';
          import react from '@vitejs/plugin-react';

          export default defineConfig({
            plugins: [react()],
            test: {
              globals: true,
              environment: 'jsdom',
              setupFiles: ['./src/test-setup.ts'],
              coverage: {
                provider: 'v8',
                reporter: ['text', 'lcov', 'json-summary'],
                thresholds: { lines: 80, functions: 80, branches: 80, statements: 80 },
                exclude: ['**/main.tsx', '**/*.config.*', '**/dist/**', '**/coverage/**'],
              },
            },
          });
          EOF

          cat > "${WORKSPACE}/eslint.config.mjs" << 'EOF'
          import js from '@eslint/js';
          import tseslint from 'typescript-eslint';
          import globals from 'globals';

          export default tseslint.config(
            { ignores: ['dist', 'coverage', '*.config.ts', 'eslint.config.mjs'] },
            js.configs.recommended,
            ...tseslint.configs.recommended,
            {
              files: ['**/*.{ts,tsx}'],
              languageOptions: { globals: { ...globals.browser } },
            },
          );
          EOF

          cat > "${WORKSPACE}/index.html" << EOF
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>${SLUG}</title>
            </head>
            <body>
              <div id="root"></div>
              <script type="module" src="/src/main.tsx"></script>
            </body>
          </html>
          EOF

          cat > "${WORKSPACE}/src/test-setup.ts" << 'EOF'
          import '@testing-library/jest-dom';
          EOF

          cat > "${WORKSPACE}/src/main.tsx" << 'EOF'
          import { StrictMode } from 'react';
          import { createRoot } from 'react-dom/client';
          import App from './App';

          createRoot(document.getElementById('root')!).render(
            <StrictMode>
              <App />
            </StrictMode>,
          );
          EOF

          cat > "${WORKSPACE}/src/App.tsx" << 'EOF'
          /** App — root component. */
          export default function App() {
            return <div id="app" />;
          }
          EOF

          echo "Workspace scaffolded at ${WORKSPACE}"
          cd "${WORKSPACE}"
          npm install
          echo "npm install complete — package-lock.json generated"
          ls -la package-lock.json

      # >>> STATUS PATCH — push branch NOW so chat can read status during the build.
      # Without this, the branch only exists on GitHub after the final push and
      # phases 3-6 are invisible to the orchestrator.
      - name: Push scaffold + status (scaffolding)
        env:
          SLUG: ${{ steps.branch.outputs.slug }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          git config user.name "adlc-agent"
          git config user.email "adlc-agent@saad-adlc.com"
          git add "workspaces/${SLUG}"
          git commit -m "chore(${SLUG}): scaffold workspace [skip ci]"
          git push -u origin "${BRANCH}"
          ./adlc-status.sh scaffolding "Workspace created, dependencies installed"

      - name: Fetch issue context
        env:
          GH_TOKEN: ${{ secrets.ADLC_AGENT_TOKEN }}
        run: |
          gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --json body,comments \
            --jq '"# Issue body\n" + .body + "\n\n# Comments\n" + ([.comments[] | "## \(.author.login):\n\(.body)"] | join("\n\n"))' \
            > issue_context.txt
          echo "--- Issue context ---"
          cat issue_context.txt

      # >>> STATUS PATCH
      - name: Status -> generating
        env:
          SLUG: ${{ steps.branch.outputs.slug }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: ./adlc-status.sh generating "Writing tests and implementation, then validating"

      - name: Run Claude Code generation agent
        env:
          CLAUDE_CODE_USE_FOUNDRY: "1"
          ANTHROPIC_FOUNDRY_RESOURCE: orix-adastra-adlc
          ANTHROPIC_FOUNDRY_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: claude-sonnet-4-6
          ANTHROPIC_DEFAULT_OPUS_MODEL: claude-opus-4-8
        run: |
          WORKSPACE=${{ steps.branch.outputs.workspace }}
          ISSUE_CONTEXT=$(cat issue_context.txt)

          printf 'You are the ADLC agent implementing a GitHub issue.

          WORKSPACE: %s
          The workspace is already scaffolded. package-lock.json already exists.
          Do NOT run npm install. Do NOT recreate package.json or config files.

          Your job:
          1. Read CLAUDE.md and ai-dev/rules/react/style.md
          2. Read the issue and write a spec.md in the workspace root
          3. Write tests first in %s/src/ (test files: kebab-case.test.tsx)
          4. Write the implementation in %s/src/ (component files: kebab-case.tsx)
          5. Update %s/src/App.tsx to mount the main component
          6. Run: cd %s && npm run ci
          7. Fix any failures until npm run ci passes
          8. Do NOT commit — the workflow handles git
          9. Do NOT modify %s/.adlc/status.json — the workflow manages it

          Issue context:
          %s' \
            "$WORKSPACE" "$WORKSPACE" "$WORKSPACE" "$WORKSPACE" "$WORKSPACE" "$WORKSPACE" \
            "$ISSUE_CONTEXT" \
            | claude --print \
              --permission-mode bypassPermissions \
              --allowed-tools "Write,Edit,Read,Bash,Glob,Grep" \
            | tee generation_log.txt

          echo "--- Generation complete ---"

      - name: Post agent output as issue comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.ADLC_AGENT_TOKEN }}
        run: |
          if [ -s generation_log.txt ]; then
            gh issue comment ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --body-file generation_log.txt
          fi

      - name: Commit all generated code
        id: commit
        run: |
          rm -rf _standards .claude ai-dev
          rm -f CLAUDE.md generation_log.txt issue_context.txt adlc-status.sh   # >>> STATUS PATCH: + adlc-status.sh

          git config user.name "adlc-agent"
          git config user.email "adlc-agent@saad-adlc.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No code generated — agent may have asked clarifying questions."
            echo "committed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "committed=true" >> $GITHUB_OUTPUT
          git commit -m "feat(adlc): generated for issue #${{ github.event.issue.number }}

          Issue: ${{ github.event.issue.title }}
          Workspace: ${{ steps.branch.outputs.workspace }}
          Pipeline: Claude Code via ADLC (Azure Foundry)
          Model: claude-sonnet-4-6"

      - name: Push and open PR
        if: steps.commit.outputs.committed == 'true'
        id: pr                                                       # >>> STATUS PATCH: added id
        env:
          GH_TOKEN: ${{ secrets.ADLC_AGENT_TOKEN }}
        run: |
          git push origin ${{ steps.branch.outputs.name }}
          PR_URL=$(gh pr create \
            --head ${{ steps.branch.outputs.name }} \
            --base main \
            --title "feat: ${{ github.event.issue.title }} (issue #${{ github.event.issue.number }})" \
            --label adlc-generated \
            --body "## Summary

          Closes #${{ github.event.issue.number }}

          Generated by Claude Code via ADLC pipeline (Azure Foundry).

          **Workspace:** \`${{ steps.branch.outputs.workspace }}\`
          **Model:** claude-sonnet-4-6

          ## How to test
          \`\`\`bash
          git checkout ${{ steps.branch.outputs.name }}
          cd ${{ steps.branch.outputs.workspace }}
          npm install && npm run dev
          \`\`\`

          ## Review instructions
          - Check code against the issue spec
          - Add inline comments for anything that needs changing
          - Add label \`adlc-iterate\` to trigger the iteration agent
          - Approve and merge when satisfied")
          echo "number=${PR_URL##*/}" >> $GITHUB_OUTPUT              # >>> STATUS PATCH

      # >>> STATUS PATCH — recreate helper (deleted before commit) and mark pr-open
      - name: Status -> pr-open
        if: steps.commit.outputs.committed == 'true'
        env:
          SLUG: ${{ steps.branch.outputs.slug }}
          BRANCH: ${{ steps.branch.outputs.name }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          mkdir -p "workspaces/${SLUG}/.adlc"
          cat > "workspaces/${SLUG}/.adlc/status.json" << JSON
          { "stage": "pr-open", "iteration": 0, "pr": ${PR},
            "preview_url": null,
            "detail": "Built and packaged — automated checks running",
            "updated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)" }
          JSON
          git add "workspaces/${SLUG}/.adlc/status.json"
          git commit -m "chore(${SLUG}): status -> pr-open [skip ci]"
          git push origin "${BRANCH}"

      - name: Notify failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "⚠️ **ADLC generation failed.**

          Check [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          Refine the issue description and re-add the \`adlc-generate\` label to retry."
