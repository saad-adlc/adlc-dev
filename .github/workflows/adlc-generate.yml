# Deviations from PLAN.md (Task 2.1):
#   - Key Vault step removed; Foundry key + agent token read directly from
#     GitHub Actions secrets (FOUNDRY_API_KEY, GITHUB_AGENT_TOKEN) for the
#     personal-GitHub POC. Restore the azure/get-keyvault-secrets step when
#     deploying into the orix-adlc org with Azure access.
name: ADLC — Generate Feature

on:
  issues:
    types: [labeled]

jobs:
  generate:
    if: github.event.label.name == 'adlc-generate'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout adlc-dev
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest standards (CLAUDE.md + ai-dev/) from adlc-standards
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/saad-adlc/adlc-standards.git _standards
          cp _standards/CLAUDE.md ./CLAUDE.md
          cp -r _standards/ai-dev ./ai-dev

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Create feature branch
        id: branch
        run: |
          ISSUE=${{ github.event.issue.number }}
          SLUG=$(echo "${{ github.event.issue.title }}" \
            | tr '[:upper:]' '[:lower:]' \
            | tr ' ' '-' \
            | tr -cd '[:alnum:]-' \
            | cut -c1-40)
          BRANCH="feature/issue-${ISSUE}-${SLUG}"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT

      - name: Run generation agent
        env:
          ANTHROPIC_BASE_URL: https://orix-adastra-adlc.openai.azure.com/openai/v1
          ANTHROPIC_API_KEY: ${{ secrets.FOUNDRY_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: claude-sonnet-4-6
        run: |
          claude --print \
            --system-prompt "$(cat CLAUDE.md)" \
            "/generate-feature ${{ github.event.issue.body }}" \
            > generation_log.txt 2>&1
          echo "--- Generation log ---"
          cat generation_log.txt

      - name: Run validation
        env:
          ANTHROPIC_BASE_URL: https://orix-adastra-adlc.openai.azure.com/openai/v1
          ANTHROPIC_API_KEY: ${{ secrets.FOUNDRY_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: claude-sonnet-4-6
        run: |
          claude --print \
            --system-prompt "$(cat CLAUDE.md)" \
            "/validate-output" \
            > validation_log.txt 2>&1
          cat validation_log.txt
          if grep -qi "FAIL" validation_log.txt; then
            echo "Validation failed — see validation_log.txt"
            exit 1
          fi

      - name: Commit generated code
        run: |
          git config user.name "adlc-agent"
          git config user.email "adlc-agent@orix-adlc.com"
          git add -A
          git commit -m "feat(adlc): generated for issue #${{ github.event.issue.number }}

          Issue: ${{ github.event.issue.title }}
          Pipeline: Claude Code via ADLC
          Model: adlc-claude-primary (Foundry)"

      - name: Push branch and open PR to adlc-stage
        env:
          GH_TOKEN: ${{ secrets.ADLC_AGENT_TOKEN }}
        run: |
          git push origin ${{ steps.branch.outputs.name }}
          gh pr create \
            --repo saad-adlc/adlc-stage \
            --head saad-adlc/adlc-dev:${{ steps.branch.outputs.name }} \
            --base main \
            --title "feat: ${{ github.event.issue.title }}" \
            --label adlc-generated \
            --body "## ADLC Generated PR

          **Source issue:** saad-adlc/adlc-dev#${{ github.event.issue.number }}
          **Model:** adlc-claude-primary (Microsoft Foundry)
          **Validation:** passed

          ### Feature request
          ${{ github.event.issue.body }}

          ### Review instructions
          1. Check code against the spec in the issue
          2. Add inline comments for anything that needs changing
          3. Add label \`adlc-iterate\` to trigger the refinement agent
          4. Approve and merge when satisfied"

      - name: Notify failure on issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "⚠️ **ADLC generation failed.**

          The agent could not produce code that passes validation.

          **Next steps:**
          1. Check [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          2. Refine the feature description in this issue
          3. Re-add label \`adlc-generate\` to retry

          If this fails again after refinement, tag \`@adastra-team\`."
