# Deviations from PLAN.md (Task 2.1):
#   - Key Vault step removed; Foundry key + agent token read directly from
#     GitHub Actions secrets (FOUNDRY_API_KEY, GITHUB_AGENT_TOKEN) for the
#     personal-GitHub POC. Restore the azure/get-keyvault-secrets step when
#     deploying into the orix-adlc org with Azure access.
name: ADLC — Generate Feature

on:
  issues:
    types: [labeled]

jobs:
  generate:
    if: github.event.label.name == 'adlc-generate'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout adlc-dev
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ADLC_AGENT_TOKEN }}

      - name: Pull latest standards (CLAUDE.md + ai-dev/) from adlc-standards
        run: |
          git clone https://x-access-token:${{ secrets.ADLC_AGENT_TOKEN }}@github.com/saad-adlc/adlc-standards.git _standards
          cp _standards/CLAUDE.md ./CLAUDE.md
          cp -r _standards/ai-dev ./ai-dev
          # Register ADLC slash commands so Claude Code recognizes /generate-feature etc.
          mkdir -p .claude/commands
          cp _standards/ai-dev/workflows/*.md .claude/commands/
          ls -la .claude/commands/

      - name: Install Claude Code (native installer per Microsoft Foundry docs)
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Create feature branch
        id: branch
        run: |
          ISSUE=${{ github.event.issue.number }}
          SLUG=$(echo "${{ github.event.issue.title }}" \
            | tr '[:upper:]' '[:lower:]' \
            | tr ' ' '-' \
            | tr -cd '[:alnum:]-' \
            | cut -c1-40)
          BRANCH="feature/issue-${ISSUE}-${SLUG}"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT

      - name: Fetch latest issue context
        # Always read the issue live via the API. The github.event payload is a
        # snapshot taken at trigger time and lags behind edits/comments (the
        # stale-body bug). This also pulls the full comment thread so the agent
        # has the running conversation when the user answers its questions.
        env:
          GH_TOKEN: ${{ secrets.ADLC_AGENT_TOKEN }}
        run: |
          gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --json body,comments \
            --jq '"# Issue body\n" + .body + "\n\n# Comments\n" + ([.comments[] | "## \(.author.login):\n\(.body)"] | join("\n\n"))' \
            > issue_context.txt
          echo "--- Issue context fetched ---"

      - name: Run generation agent
        env:
          # Per Microsoft Foundry docs (learn.microsoft.com/.../configure-claude-code).
          # CLAUDE_CODE_USE_FOUNDRY=1 makes the CLI handle Foundry protocol details
          # internally (including which beta headers to send to Foundry's gateway).
          CLAUDE_CODE_USE_FOUNDRY: "1"
          ANTHROPIC_FOUNDRY_RESOURCE: orix-adastra-adlc
          ANTHROPIC_FOUNDRY_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: claude-sonnet-4-6
          ANTHROPIC_DEFAULT_OPUS_MODEL: claude-opus-4-8
        run: |
          # Pipe prompt via stdin to avoid bash arg-quoting issues with multi-line
          # bodies. Feed the live issue body + full comment thread (fetched above),
          # not the event-payload snapshot, so re-runs see the user's answers.
          printf '/generate-feature %s\n' "$(cat issue_context.txt)" | claude --print \
            --permission-mode bypassPermissions \
            --allowed-tools "Write,Edit,Read,Bash,Glob,Grep" \
            | tee generation_log.txt
          echo "--- Generation finished ---"

      - name: Post agent response as issue comment
        # Always post the agent's output back to the issue — both when it asks
        # clarifying questions (conversation loop) and when it generates code
        # (audit trail). Runs before the commit step, which deletes the log.
        if: always()
        env:
          GH_TOKEN: ${{ secrets.ADLC_AGENT_TOKEN }}
        run: |
          if [ -s generation_log.txt ]; then
            gh issue comment ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --body-file generation_log.txt
          else
            echo "No generation_log.txt to post (agent step may not have run)."
          fi

      - name: Commit generated code
        id: commit
        run: |
          # Remove agent-context artifacts before commit (these live in adlc-standards,
          # not in the feature branch; they were copied in for Claude to read).
          rm -rf _standards .claude ai-dev
          rm -f CLAUDE.md generation_log.txt issue_context.txt

          git config user.name "adlc-agent"
          git config user.email "adlc-agent@saad-adlc.com"
          git add -A

          # No files = the agent asked clarifying questions instead of coding.
          # That's a valid conversation-loop outcome, not a failure: exit clean
          # so the run goes green. The question comment was already posted above;
          # the user answers in a comment and re-toggles the label to continue.
          if git diff --cached --quiet; then
            echo "No code generated — agent asked clarifying questions. Exiting cleanly."
            echo "committed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "committed=true" >> $GITHUB_OUTPUT

          git commit -m "feat(adlc): generated for issue #${{ github.event.issue.number }}

          Issue: ${{ github.event.issue.title }}
          Pipeline: Claude Code via ADLC
          Model: claude-sonnet-4-6 (Foundry)"

      - name: Push branch and open PR to adlc-stage
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.ADLC_AGENT_TOKEN }}
        run: |
          git push origin ${{ steps.branch.outputs.name }}
          gh pr create \
            --head ${{ steps.branch.outputs.name }} \
            --base main \
            --title "feat: ${{ github.event.issue.title }}" \
            --label adlc-generated \
            --body "## ADLC Generated PR

          **Source issue:** #${{ github.event.issue.number }}
          **Model:** claude-sonnet-4-6 (Microsoft Foundry)
          **Validation:** passed

          ### Feature request
          ${{ github.event.issue.body }}

          ### Review instructions
          1. Check code against the spec in the issue
          2. Add inline comments for anything that needs changing
          3. Add label \`adlc-iterate\` to trigger the refinement agent
          4. Approve and merge when satisfied"

      - name: Notify failure on issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "⚠️ **ADLC generation failed.**

          The agent could not produce code that passes validation.

          **Next steps:**
          1. Check [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          2. Refine the feature description in this issue
          3. Re-add label \`adlc-generate\` to retry

          If this fails again after refinement, tag \`@adastra-team\`."
