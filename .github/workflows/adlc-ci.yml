# CI scoped to workspaces/ — each workspace is self-contained.
# Detects which workspace changed in the PR and runs CI only for that one.
# Supports React/Vite workspaces today; Java/dotnet steps added when needed.
name: ADLC — CI

on:
  pull_request:
    branches: [main]

jobs:
  detect-workspace:
    name: Detect changed workspace
    runs-on: ubuntu-latest
    outputs:
      workspace: ${{ steps.detect.outputs.workspace }}
      stack: ${{ steps.detect.outputs.stack }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect workspace from changed files
        id: detect
        run: |
          # Find the workspace directory from changed files
          WORKSPACE=$(git diff --name-only origin/main...HEAD \
            | grep '^workspaces/' \
            | head -1 \
            | cut -d'/' -f2)

          if [ -z "$WORKSPACE" ]; then
            echo "No workspace changes detected — skipping CI"
            echo "workspace=" >> $GITHUB_OUTPUT
            echo "stack=none" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "Detected workspace: $WORKSPACE"

          # Detect stack from workspace contents
          if [ -f "workspaces/$WORKSPACE/package.json" ]; then
            echo "stack=node" >> $GITHUB_OUTPUT
          elif [ -f "workspaces/$WORKSPACE/pom.xml" ]; then
            echo "stack=java" >> $GITHUB_OUTPUT
          elif ls workspaces/$WORKSPACE/*.sln 2>/dev/null; then
            echo "stack=dotnet" >> $GITHUB_OUTPUT
          else
            echo "stack=unknown" >> $GITHUB_OUTPUT
          fi

  ci-node:
    name: CI — Node/React
    needs: detect-workspace
    if: needs.detect-workspace.outputs.stack == 'node'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: workspaces/${{ needs.detect-workspace.outputs.workspace }}/package-lock.json

      - name: Install
        working-directory: workspaces/${{ needs.detect-workspace.outputs.workspace }}
        run: npm ci

      - name: TypeScript check
        working-directory: workspaces/${{ needs.detect-workspace.outputs.workspace }}
        run: npx tsc --noEmit

      - name: Lint
        working-directory: workspaces/${{ needs.detect-workspace.outputs.workspace }}
        run: npx eslint . --max-warnings 0

      - name: Test + coverage
        working-directory: workspaces/${{ needs.detect-workspace.outputs.workspace }}
        run: npm run test:coverage

      - name: Coverage gate (80%)
        working-directory: workspaces/${{ needs.detect-workspace.outputs.workspace }}
        run: |
          PCT=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          echo "Coverage: ${PCT}%"
          awk "BEGIN{ exit ($PCT < 80) }" || \
            (echo "❌ Coverage ${PCT}% below 80%" && exit 1)

      - name: Approved-packages check (WS8 allow-list, default-deny)
        working-directory: workspaces/${{ needs.detect-workspace.outputs.workspace }}
        env:
          STANDARDS_REPO: saad-adlc/adlc-standards
          STANDARDS_TOKEN: ${{ secrets.ADLC_AGENT_TOKEN }}
        run: |
          # The independent, deterministic allow-list gate. Clones the standards (source of
          # truth) and validates this workspace's package.json against approved-packages.json:
          # any UNLISTED or BANNED direct dependency fails the PR (replaces the old banned-only
          # grep with full default-deny). Transitive deps are Dependabot's job (WS5).
          git clone --depth 1 "https://x-access-token:${STANDARDS_TOKEN}@github.com/${STANDARDS_REPO}.git" /tmp/adlc-standards
          bash /tmp/adlc-standards/hooks/check-approved-packages.sh \
            package.json /tmp/adlc-standards/steering/approved-packages.json
  adlc-status-clean:
    name: Status -> clean
    needs: [ci-node]
    if: success() && startsWith(github.head_ref, 'feature/issue-')
    runs-on: ubuntu-latest
    # WS10: comment instead of committing -> the PR head stays at the code commit.
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4   # for .github/scripts/post-status-comment.sh
      - name: Post status -> clean (in-place comment)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash .github/scripts/post-status-comment.sh \
            "${{ github.event.pull_request.number }}" \
            "clean" \
            "All automated checks passed — deploying your live preview."
