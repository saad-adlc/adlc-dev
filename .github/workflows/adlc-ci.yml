# Deviations from PLAN.md (Task 2.3):
#   - Working directory updated from frontend/ → apps/orders-web/ to match
#     the actual project structure.
#   - Backend steps removed until a backend project exists under backend/.
#   - Vitest invoked with --coverage.reporter=json-summary so the
#     coverage-summary.json file the gate reads actually exists.
#   - Banned-package grep tightened to "lodash": (with colon) so it no
#     longer false-positives on the allowed lodash-es dependency.
name: ADLC — CI

on:
  pull_request:
    branches: [main]

jobs:
  adlc-ci:
    name: adlc-ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/orders-web/package-lock.json

      - name: Frontend — install
        working-directory: apps/orders-web
        run: npm ci

      - name: Frontend — TypeScript check
        working-directory: apps/orders-web
        run: npx tsc --noEmit

      - name: Frontend — lint
        working-directory: apps/orders-web
        run: npx eslint . --max-warnings 0

      - name: Frontend — test + coverage
        working-directory: apps/orders-web
        run: npm test -- --coverage --coverage.reporter=json-summary --coverage.reporter=text --reporter=verbose

      - name: Frontend — coverage gate (80%)
        working-directory: apps/orders-web
        run: |
          PCT=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          echo "Coverage: ${PCT}%"
          awk "BEGIN{ exit ($PCT < 80) }" || \
            (echo "❌ Coverage ${PCT}% below 80%" && exit 1)

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Banned package check
        run: |
          BANNED=('"moment":' '"lodash":')
          for pkg in "${BANNED[@]}"; do
            if grep -r "$pkg" apps/orders-web/package.json 2>/dev/null; then
              echo "❌ Banned package: $pkg"
              exit 1
            fi
          done
          echo "✅ No banned packages"
