# Deviations from PLAN.md (Task 2.2):
#   - Key Vault step removed; Foundry key + agent token read directly from
#     GitHub Actions secrets (FOUNDRY_API_KEY, GITHUB_AGENT_TOKEN) for the
#     personal-GitHub POC.
name: ADLC — Iterate on Feedback

on:
  pull_request_review:
    types: [submitted]

jobs:
  iterate:
    if: contains(github.event.pull_request.labels.*.name, 'adlc-iterate')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest standards (CLAUDE.md + ai-dev/) from adlc-standards
        run: |
          git clone https://x-access-token:${{ secrets.ADLC_AGENT_TOKEN }}@github.com/saad-adlc/adlc-standards.git _standards
          cp _standards/CLAUDE.md ./CLAUDE.md
          cp -r _standards/ai-dev ./ai-dev

      - name: Collect PR feedback
        env:
          GH_TOKEN: ${{ secrets.ADLC_AGENT_TOKEN }}
        run: |
          gh pr view ${{ github.event.pull_request.number }} \
            --json reviews,comments,body \
            > pr_feedback.json

      - name: Run iteration agent
        env:
          ANTHROPIC_BASE_URL: https://orix-adastra-adlc.services.ai.azure.com/anthropic
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          FEEDBACK=$(cat pr_feedback.json)
          printf '/iterate %s %s\n' "$PR_NUMBER" "$FEEDBACK" | claude --print \
            --model claude-sonnet-4-6 \
            --permission-mode bypassPermissions \
            --allowed-tools "Write,Edit,Read,Bash,Glob,Grep" \
            | tee iteration_log.txt

      - name: Validate iteration
        env:
          ANTHROPIC_BASE_URL: https://orix-adastra-adlc.services.ai.azure.com/anthropic
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          echo "/validate-output" | claude --print \
            --model claude-sonnet-4-6 \
            --permission-mode bypassPermissions \
            --allowed-tools "Read,Bash,Glob,Grep" \
            | tee validation_log.txt
          grep -qi "FAIL" validation_log.txt && exit 1 || true

      - name: Commit and push iteration
        run: |
          git config user.name "adlc-agent"
          git config user.email "adlc-agent@orix-adlc.com"
          ITER=$(git log --oneline | grep -c "iteration" || echo 0)
          git add -A
          git commit -m "feat(adlc): iteration $((ITER+1)) — PR feedback addressed"
          git push origin HEAD

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ secrets.ADLC_AGENT_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "✅ Iteration complete. New commit pushed — please re-review."
