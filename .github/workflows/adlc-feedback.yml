# ADLC — Business User Feedback Loop
#
# Triggers when a business user comments on a PR with feedback.
# The agent reads the comment, iterates on the code, pushes a new commit,
# CI re-runs, and the preview redeploys automatically.
#
# Only fires on PRs labelled adlc-generated — ignores engineer review comments.
# The agent also renders the updated app inline in a reply comment
# so the business user sees the result without leaving GitHub.

name: ADLC — Business User Feedback

on:
  issue_comment:
    types: [created]

jobs:
  check-context:
    name: Check if comment is on an adlc-generated PR
    runs-on: ubuntu-latest
    outputs:
      is_adlc_pr: ${{ steps.check.outputs.is_adlc_pr }}
      pr_number: ${{ steps.check.outputs.pr_number }}
      workspace: ${{ steps.check.outputs.workspace }}
      branch: ${{ steps.check.outputs.branch }}
    steps:
      - name: Check PR labels and context
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Only run on PR comments, not issue comments
          if [ "${{ github.event.issue.pull_request }}" == "" ]; then
            echo "is_adlc_pr=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          PR_NUMBER=${{ github.event.issue.number }}

          # Check if PR has adlc-generated label
          HAS_LABEL=$(gh pr view "$PR_NUMBER" \
            --repo ${{ github.repository }} \
            --json labels \
            --jq '.labels[] | select(.name == "adlc-generated") | .name' \
            2>/dev/null || echo "")

          if [ -z "$HAS_LABEL" ]; then
            echo "is_adlc_pr=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Skip comments from the agent itself
          if [ "${{ github.event.comment.user.login }}" == "adlc-agent" ]; then
            echo "is_adlc_pr=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get branch and detect workspace
          BRANCH=$(gh pr view "$PR_NUMBER" \
            --repo ${{ github.repository }} \
            --json headRefName --jq '.headRefName')

          WORKSPACE=$(gh pr view "$PR_NUMBER" \
            --repo ${{ github.repository }} \
            --json files \
            --jq '[.files[].path | select(startswith("workspaces/"))] | first | split("/")[1]' \
            2>/dev/null || echo "")

          echo "is_adlc_pr=true" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

  iterate-and-redeploy:
    name: Iterate on feedback and redeploy preview
    needs: check-context
    if: needs.check-context.outputs.is_adlc_pr == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-context.outputs.branch }}
          token: ${{ secrets.ADLC_AGENT_TOKEN }}

      - name: Pull latest standards from adlc-standards
        run: |
          git clone \
            https://x-access-token:${{ secrets.ADLC_AGENT_TOKEN }}@github.com/saad-adlc/adlc-standards.git \
            _standards
          cp _standards/CLAUDE.md ./CLAUDE.md
          cp -r _standards/ai-dev ./ai-dev
          mkdir -p .claude/commands
          cp _standards/ai-dev/workflows/*.md .claude/commands/

      - name: Install Claude Code
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Fetch PR comment and context
        env:
          GH_TOKEN: ${{ secrets.ADLC_AGENT_TOKEN }}
        run: |
          PR_NUMBER=${{ needs.check-context.outputs.pr_number }}
          WORKSPACE=${{ needs.check-context.outputs.workspace }}

          # Get full PR conversation — all comments for context
          gh pr view "$PR_NUMBER" \
            --repo ${{ github.repository }} \
            --json body,comments,reviews \
            --jq '"# PR description\n" + .body +
                  "\n\n# Review comments\n" +
                  ([.reviews[] | "## \(.author.login) [\(.state)]:\n\(.body)"] | join("\n\n")) +
                  "\n\n# Comments\n" +
                  ([.comments[] | "## \(.author.login):\n\(.body)"] | join("\n\n"))' \
            > pr_context.txt

          # Latest comment is the business user feedback to act on
          echo "${{ github.event.comment.body }}" > latest_feedback.txt

          echo "Workspace: $WORKSPACE"
          echo "Feedback: $(cat latest_feedback.txt)"

      - name: Run iteration agent
        env:
          CLAUDE_CODE_USE_FOUNDRY: "1"
          ANTHROPIC_FOUNDRY_RESOURCE: orix-adastra-adlc
          ANTHROPIC_FOUNDRY_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: claude-sonnet-4-6
          ANTHROPIC_DEFAULT_OPUS_MODEL: claude-opus-4-8
        run: |
          WORKSPACE=${{ needs.check-context.outputs.workspace }}
          FEEDBACK=$(cat latest_feedback.txt)
          CONTEXT=$(cat pr_context.txt)

          printf '/iterate %s "%s"\n\nFull PR context:\n%s' \
            "${{ needs.check-context.outputs.pr_number }}" \
            "$FEEDBACK" \
            "$CONTEXT" \
            | claude --print \
              --permission-mode bypassPermissions \
              --allowed-tools "Write,Edit,Read,Bash,Glob,Grep" \
            | tee iteration_log.txt

          echo "--- Iteration finished ---"

      - name: Commit and push iteration
        id: commit
        run: |
          rm -rf _standards .claude ai-dev CLAUDE.md
          rm -f pr_context.txt latest_feedback.txt iteration_log.txt

          git config user.name "adlc-agent"
          git config user.email "adlc-agent@saad-adlc.com"
          git add -A

          if git diff --cached --quiet; then
            echo "committed=false" >> $GITHUB_OUTPUT
            echo "No changes — agent may have asked a clarifying question"
            exit 0
          fi

          echo "committed=true" >> $GITHUB_OUTPUT
          git commit -m "fix(adlc): iterate on business user feedback — PR #${{ needs.check-context.outputs.pr_number }}

          Feedback: ${{ github.event.comment.body }}
          Agent: Claude Code via ADLC (Foundry)"

          git push origin ${{ needs.check-context.outputs.branch }}

      - name: Post acknowledgement comment
        env:
          GH_TOKEN: ${{ secrets.ADLC_AGENT_TOKEN }}
        run: |
          if [ "${{ steps.commit.outputs.committed }}" == "true" ]; then
            gh pr comment ${{ needs.check-context.outputs.pr_number }} \
              --repo ${{ github.repository }} \
              --body "🔄 **ADLC — Iterating on your feedback**

          Your feedback has been applied and a new commit pushed.

          > CI is running now. The preview will update automatically once it passes.
          > Check the Checks tab to follow progress."
          else
            gh pr comment ${{ needs.check-context.outputs.pr_number }} \
              --repo ${{ github.repository }} \
              --body "🤔 **ADLC — Clarification needed**

          The agent needs a bit more detail to action your feedback.
          Could you clarify what you'd like changed?

          Your feedback: *${{ github.event.comment.body }}*"
          fi
