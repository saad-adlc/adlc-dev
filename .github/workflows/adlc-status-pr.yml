name: ADLC — Status PR-Open
on:
  pull_request:
    types: [opened]

jobs:
  status:
    if: >
      contains(github.event.pull_request.labels.*.name, 'adlc-generated') &&
      startsWith(github.event.pull_request.head.ref, 'feature/issue-')
    runs-on: ubuntu-latest
    # WS10: comment, don't commit — no contents:write, so the PR head stays at the code
    # commit (lets CI + business-approval become required checks). Status -> in-place comment.
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4   # for .github/scripts/post-status-comment.sh
      - name: Post status -> pr-open (in-place comment, no branch commit)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash .github/scripts/post-status-comment.sh \
            "${{ github.event.pull_request.number }}" \
            "pr-open" \
            "Built and packaged — automated checks are running."
