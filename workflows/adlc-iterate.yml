# ADLC v2 — Phase 8 self-healing iterate loop
# Place in saad-adlc/adlc-dev/.github/workflows/adlc-iterate.yml
#
# Requires repo secrets:
#   ADLC_PAT            — PAT with repo scope (pushes must retrigger CI; the
#                         default GITHUB_TOKEN will NOT — GitHub anti-loop rule)
#   ANTHROPIC_API_KEY   — same key adlc-generate.yml uses for Claude Code

name: adlc-iterate

on:
  workflow_run:
    workflows: ["adlc-ci"]          # match the exact name: in adlc-ci.yml
    types: [completed]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  iterate:
    runs-on: ubuntu-latest
    # Fire only on: CI failure | changes_requested review | /adlc-iterate comment on a PR
    if: >
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'failure' &&
       startsWith(github.event.workflow_run.head_branch, 'feature/issue-')) ||
      (github.event_name == 'pull_request_review' &&
       github.event.review.state == 'changes_requested' &&
       startsWith(github.event.pull_request.head.ref, 'feature/issue-')) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '/adlc-iterate:'))
    steps:
      - name: Resolve branch + PR number
        id: ctx
        uses: actions/github-script@v7
        with:
          script: |
            let branch, pr;
            if (context.eventName === 'workflow_run') {
              branch = context.payload.workflow_run.head_branch;
              const prs = await github.rest.pulls.list({ ...context.repo, head: `${context.repo.owner}:${branch}`, state: 'open' });
              pr = prs.data[0]?.number;
            } else if (context.eventName === 'pull_request_review') {
              branch = context.payload.pull_request.head.ref;
              pr = context.payload.pull_request.number;
            } else {
              pr = context.payload.issue.number;
              const prData = await github.rest.pulls.get({ ...context.repo, pull_number: pr });
              branch = prData.data.head.ref;
            }
            if (!pr || !branch) core.setFailed('No open PR for this event');
            core.setOutput('branch', branch);
            core.setOutput('pr', pr);

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ctx.outputs.branch }}
          token: ${{ secrets.ADLC_PAT }}     # so the push retriggers adlc-ci
          fetch-depth: 0

      - name: Enforce iteration cap (3)
        id: cap
        run: |
          N=$(git log --oneline | grep -c 'iteration-' || true)
          echo "count=$N" >> "$GITHUB_OUTPUT"
          if [ "$N" -ge 3 ]; then echo "capped=true" >> "$GITHUB_OUTPUT"; fi

      - name: Escalate if cap reached
        if: steps.cap.outputs.capped == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const slug = '${{ steps.ctx.outputs.branch }}'.replace('feature/','');
            // status.json -> escalated
            const path = `workspaces/${slug}/.adlc/status.json`;
            const branch = '${{ steps.ctx.outputs.branch }}';
            const { data: cur } = await github.rest.repos.getContent({ ...context.repo, path, ref: branch }).catch(() => ({ data: null }));
            const status = { stage: 'escalated', phase: 8, iteration: 3, pr: ${{ steps.ctx.outputs.pr }},
                             detail: 'Iteration cap (3) reached — human input needed', updated: new Date().toISOString() };
            await github.rest.repos.createOrUpdateFileContents({ ...context.repo, path, branch,
              message: 'chore: escalate — iteration cap reached',
              content: Buffer.from(JSON.stringify(status, null, 2)).toString('base64'),
              sha: cur?.sha });
            await github.rest.issues.createComment({ ...context.repo, issue_number: ${{ steps.ctx.outputs.pr }},
              body: 'ADLC: iteration cap (3) reached. Human input needed — see status.json detail.' });

      - name: Gather failure context
        if: steps.cap.outputs.capped != 'true'
        id: fail
        uses: actions/github-script@v7
        with:
          script: |
            let prompt = '';
            if (context.eventName === 'workflow_run') {
              prompt = `CI run ${context.payload.workflow_run.html_url} failed. Fetch its logs via gh CLI, identify the failing check (typecheck/lint/test/coverage), and fix it.`;
            } else if (context.eventName === 'pull_request_review') {
              prompt = `Reviewer requested changes on PR #${{ steps.ctx.outputs.pr }}. Read all review comments via gh CLI and address them.`;
            } else {
              prompt = `Business-user feedback: ${context.payload.comment.body.replace('/adlc-iterate:','').trim()}`;
            }
            core.setOutput('prompt', prompt);

      - name: Setup Node
        if: steps.cap.outputs.capped != 'true'
        uses: actions/setup-node@v4
        with: { node-version: 24 }

      - name: Claude Code — fix
        if: steps.cap.outputs.capped != 'true'
        uses: anthropics/claude-code-action@v1     # mirror the version/inputs used in adlc-generate.yml
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.ADLC_PAT }}
          prompt: |
            You are ADLC Phase 8 (auto-iterate) on branch ${{ steps.ctx.outputs.branch }},
            PR #${{ steps.ctx.outputs.pr }}, iteration ${{ steps.cap.outputs.count }} of max 3.

            Task: ${{ steps.fail.outputs.prompt }}

            Rules:
            - Work ONLY inside the workspace directory matching this branch slug
            - Minimal fix: do not refactor working code, add dependencies, or touch workflows
            - Read full files before editing
            - Run `npm run ci` in the workspace and ensure it passes before committing
            - Update workspaces/[slug]/.adlc/status.json: stage "iterating",
              iteration ${{ steps.cap.outputs.count }}+1, detail = what you fixed;
              the CI workflow will set "clean" when checks pass
            - Commit as: fix([slug]): iteration-[N] — [what was fixed]
            - Push to the branch
